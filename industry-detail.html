n-runtime.js?v=20260705"></script><script src="auth-modal.js?v=20260705"></script><script src="mobile-nav.js?v=20260705"></script><script src="animate.js?v=20260705"></script><script>(function () {
  var KEFU = "https://work.weixin.qq.com/kfid/kfc6e28eb8ad6d63cf7";

  //  URL 
  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  // 
  var statusMap = {
    live:  { cls: "badge-live",   text: " · " },
    beta:  { cls: "badge-beta",   text: "" },
    soon:  { cls: "badge-soon",   text: "" },
    invite:{ cls: "badge-invite", text: "" }
  };

  // HTML  HTML  unescaped 
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // feature-list
  function renderPainPoints(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) {
      return "<li>" + esc(i) + "</li>";
    }).join("") + "</ul>";
  }

  // flow-chain
  function renderFlow(steps) {
    if (!steps || !steps.length) return "";
    var nodes = steps.map(function (step, idx) {
      var cls = (idx === Math.floor(steps.length / 2)) ? 'flow-node current' : 'flow-node';
      return '<span class="' + cls + '">' + esc(step) + '</span>';
    });
    return '<div class="flow-chain">' + nodes.join('<span class="flow-arrow"></span>') + '</div>';
  }

  // spec-table 
  function renderKpis(kpis) {
    if (!kpis || !kpis.length) return "";
    var rows = kpis.map(function (k) {
      return '<tr>' +
        '<th>' + esc(k.name) + '</th>' +
        '<td class="type" style="white-space:nowrap;color:var(--accent-600);font-weight:600;">' + esc(k.target) + '</td>' +
        '<td class="required">' + esc(k.desc) + '</td>' +
        '</tr>';
    }).join("");
    return '<table class="spec-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  // chip
  function renderApps(apps) {
    if (!apps || !apps.length) return "";
    return '<div class="pill-cloud">' + apps.map(function (a) {
      return '<span class="chip">' + esc(a) + '</span>';
    }).join("") + '</div>';
  }

  //  Agent & Skillcompose-relate  + 
  function renderAgentSkill(industry) {
    var html = "";
    var agents = industry.recommendedAgents || [];
    var skills = industry.recommendedSkills || [];

    if (agents.length) {
      html += '<h4 style="margin-bottom:8px;font-size:15px;display:flex;align-items:center;gap:8px;"><span></span>Agent</h4>';
      html += '<div class="compose-relate">';
      agents.forEach(function (a) {
        html += '<a href="agent-detail.html?id=' + encodeURIComponent(a.id) + '" class="compose-relate-item" style="text-decoration:none;color:inherit;">' +
          '<div class="cr-icon"></div>' +
          '<div class="cr-name">' + esc(a.name) + '</div>' +
          '<div class="cr-role">Agent  </div>' +
          '</a>';
      });
      html += '</div>';
    }

    if (skills.length) {
      html += '<h4 style="margin:24px 0 8px;font-size:15px;display:flex;align-items:center;gap:8px;"><span></span>Skill</h4>';
      html += '<div class="compose-relate">';
      skills.forEach(function (s) {
        html += '<a href="skill-detail.html?id=' + encodeURIComponent(s.id) + '" class="compose-relate-item" style="text-decoration:none;color:inherit;">' +
          '<div class="cr-icon"></div>' +
          '<div class="cr-name">' + esc(s.name) + '</div>' +
          '<div class="cr-role">Skill  </div>' +
          '</a>';
      });
      html += '</div>';
    }

    if (!html) return "<p></p>";
    return html;
  }

  //  OPC callout HTML 
  function renderOpcService(text) {
    if (!text) return "";
    return '<div class="callout callout-info"><span class="callout-icon"></span><div>' + text + '</div></div>';
  }

  // 
  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p>' +
      '<div class="case-metrics">' + metrics + '</div>';
  }

  // 
  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    var items = cl.map(function (c) {
      return '<div class="changelog-item">' +
        '<span class="cl-version">' + esc(c.version) + '</span>' +
        '<span class="cl-date">' + esc(c.date) + '</span>' +
        '<div class="cl-content">' + esc(c.content) + '</div>' +
        '</div>';
    }).join("");
    return '<div class="changelog">' + items + '</div>';
  }

  // 
  function renderSpecs(specs) {
    if (!specs || !specs.length) return "";
    var rows = specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("");
    return '<div class="sidebar-card"><h4></h4>' + rows + '</div>';
  }

  // 
  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.INDUSTRIES_DATA;

    // 
    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span>' +
        '<h1></h1>' +
        '<p class="lead" style="margin:20px 0 32px;"></p>' +
        '<a href="solutions.html" class="btn btn-accent btn-lg"></a>' +
        '</div></section>';
      document.title = " | Galileo OS";
      return;
    }

    var s = data[id];
    var st = statusMap[s.status] || statusMap.live;

    //  title
    document.title = s.name + " ·  | Galileo OS";

    //  CTA
    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + s.name + "";
    var ctaBtn = document.getElementById("detail-root");
    // CTA  onclick 

    //  4 
    var allIds = Object.keys(data).filter(function (k) { return k !== id; });
    var related = allIds.slice(0, 4);

    //  HTML
    var html = '';

    // 1. 
    html += '<section class="hero-light" style="padding-bottom:0;">';
    html += '<div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="solutions.html"></a><span class="sep">/</span>';
    html += '<span class="current">' + esc(s.name) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 2. Hero 
    html += '<section class="detail-hero" style="padding-top:24px;">';
    html += '<div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + s.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite"></span>';
    html += '<span class="badge badge-beta">' + esc(s.updatedAt) + '</span>';
    html += '</div>';
    html += '<h1>' + esc(s.name) + '</h1>';
    html += '<p class="desc-line">' + esc(s.oneLine) + '</p>';
    html += '</div>';
    html += '</div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    s.tags.forEach(function (t) {
      html += '<span class="chip">' + esc(t) + '</span>';
    });
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 3. 
    html += '<section style="padding-top:56px;padding-bottom:80px;">';
    html += '<div class="container">';
    html += '<div class="detail-layout">';

    // ——  ——
    html += '<div class="detail-main">';

    // §01 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">01</span></h2>';
    html += '<p>' + esc(s.overview) + '</p>';
    html += '</div>';

    // §02 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">02</span></h2>';
    html += '<p style="margin-bottom:8px;">——</p>';
    html += renderPainPoints(s.painPoints);
    html += '</div>';

    // §03 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">03</span></h2>';
    html += '<p style="margin-bottom:8px;">/</p>';
    html += renderFlow(s.typicalFlow);
    html += '</div>';

    // §04 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">04</span>KPI</h2>';
    html += '<p style="margin-bottom:8px;"></p>';
    html += renderKpis(s.kpis);
    html += '</div>';

    // §05 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">05</span></h2>';
    html += '<p style="margin-bottom:8px;"></p>';
    html += renderApps(s.recommendedApps);
    html += '</div>';

    // §06  Agent & Skill
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">06</span>Agent & Skill</h2>';
    html += '<p style="margin-bottom:8px;"></p>';
    html += renderAgentSkill(s);
    html += '</div>';

    // §07 OPC 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">07</span>OPC</h2>';
    html += renderOpcService(s.opcService);
    html += '</div>';

    // §08 
    if (s.case) {
      html += '<div class="detail-section">';
      html += '<h2><span class="sec-num">08</span></h2>';
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(s.case.title) + '</strong></div></div>';
      html += renderCase(s.case);
      html += '</div>';
    }

    // 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">09</span></h2>';
    html += renderChangelog(s.changelog);
    html += '</div>';

    html += '</div>'; // /.detail-main

    // ——  ——
    html += '<aside class="detail-sidebar">';

    // CTA   GalileoAuth.showContact
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + esc(s.name) + '行业方案\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;"></button>';
    html += '<a href="partner-opc.html" class="btn btn-ghost-light btn-lg full">OPC</a>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;">3  Demo</p>';
    html += '</div>';

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += '<div class="kv-row"><span class="k"></span><span class="v"><span class="badge ' + st.cls + '" style="font-size:11px;">' + st.text + '</span></span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + esc(s.updatedAt) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + (s.painPoints ? s.painPoints.length : 0) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + (s.kpis ? s.kpis.length : 0) + '</span></div>';
    html += '</div>';

    // 
    html += renderSpecs(s.specs);

    // 
    if (related.length) {
      html += '<div class="sidebar-card">';
      html += '<h4></h4>';
      related.forEach(function (rid) {
        var r = data[rid];
        if (!r) return;
        html += '<div class="kv-row"><a href="industry-detail.html?id=' + encodeURIComponent(rid) + '" class="k" style="color:var(--accent-600);">' + r.icon + ' ' + esc(r.name) + ' </a></div>';
      });
      html += '</div>';
    }

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += '<div class="kv-row"><a href="solutions.html" class="k" style="color:var(--accent-600);"></a></div>';
    html += '<div class="kv-row"><a href="agents.html" class="k" style="color:var(--accent-600);">Agent  </a></div>';
    html += '<div class="kv-row"><a href="skills.html" class="k" style="color:var(--accent-600);">Skill  </a></div>';
    html += '<div class="kv-row"><a href="partner-opc.html" class="k" style="color:var(--accent-600);">OPC  </a></div>';
    html += '</div>';

    html += '</aside>';

    html += '</div>'; // /.detail-layout
    html += '</div>'; // /.container
    html += '</section>';

    root.innerHTML = html;

    // 
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  // 
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="customer-service.js?v=20260705"></script></body></html>
