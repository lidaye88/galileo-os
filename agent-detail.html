/script><script src="mobile-nav.js?v=20260705"></script><script src="animate.js?v=20260705"></script><script src="agents-data.js?v=20260705"></script><script src="admin-runtime.js?v=20260705"></script><script>(function () {
  // 
  GalileoAuth.init();

  //  URL 
  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  //  agents.html 
  var statusMap = {
    live:  { cls: "badge-live",  text: "" },
    beta:  { cls: "badge-beta",  text: "" },
    soon:  { cls: "badge-soon",  text: "" },
    invite:{ cls: "badge-invite", text: "" }
  };

  // HTML 
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // feature-list
  function renderList(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) {
      return "<li>" + esc(i) + "</li>";
    }).join("") + "</ul>";
  }

  // 5  flow-chain
  function renderWorkflow(steps) {
    if (!steps || !steps.length) return "";
    var arrows = ["", "", "", "", ""];
    var html = '<div class="flow-chain" style="flex-direction:column;align-items:stretch;gap:0;margin-top:8px;">';
    steps.forEach(function (step, idx) {
      var num = String(idx + 1).padStart(2, "0");
      html += '<div style="display:flex;gap:16px;padding:18px 20px;background:var(--bg-muted);border:1px solid var(--border-default);border-radius:var(--radius-md);margin-bottom:12px;align-items:flex-start;">';
      html += '<div style="flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--accent-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;">' + (arrows[idx] || (idx + 1)) + '</div>';
      html += '<div style="flex:1;min-width:0;">';
      html += '<div style="font-size:12px;font-family:\'SF Mono\',monospace;color:var(--accent-600);font-weight:600;margin-bottom:4px;">STEP ' + num + '</div>';
      html += '<div style="font-size:14px;line-height:1.7;color:var(--text-primary);">' + esc(step) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  // compose-relate skill-detail
  function renderDependencies(deps) {
    if (!deps || !deps.length) return "<p>Agent  Skill</p>";
    //   skill-id 
    var skillIdMap = {
      "": "data-cleaning", "": "data-mapping", "": "anomaly-detection",
      "": "subject-modeling", "": "scheduling-algo", "": "prediction-model",
      "CV ": "cv-recognition", "": "energy-optimization",
      "": "process-knowledge", "": "quality-rules", "": "maintenance-rules",
      " SOP": "industry-sop", "PLC ": "plc-readwrite", "OPC UA ": "opcua-access",
      "Modbus ": "modbus-access", "": "edge-control", "ERP ": "erp-integration",
      "MES ": "mes-integration", "WMS ": "wms-integration", " /  / ": "im-notification",
      "IM ": "im-notification", "": "kpi-calc", "BI ": "bi-report",
      "": "realtime-dashboard", "": "business-analysis"
    };
    return '<div class="compose-relate">' + deps.map(function (d) {
      var sid = skillIdMap[d];
      if (sid) {
        return '<a class="compose-relate-item" href="skill-detail.html?id=' + sid + '" style="text-decoration:none;display:block;">' +
          '<div class="cr-icon"></div>' +
          '<div class="cr-name">' + esc(d) + '</div>' +
          '<div class="cr-role">能力单元</div></a>';
      }
      return '<div class="compose-relate-item">' +
        '<div class="cr-icon"></div>' +
        '<div class="cr-name">' + esc(d) + '</div>' +
        '<div class="cr-role"></div></div>';
    }).join("") + '</div>';
  }

  // 3 
  function renderSafety(sb) {
    if (!sb) return "";
    var items = [
      { icon: "", label: "", value: sb.autoExecute },
      { icon: "", label: "", value: sb.needConfirm },
      { icon: "", label: "", value: sb.approval }
    ];
    var html = '<div class="grid grid-3" style="gap:16px;">';
    items.forEach(function (it) {
      html += '<div class="sidebar-card" style="margin:0;">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
      html += '<span style="font-size:20px;">' + it.icon + '</span>';
      html += '<h4 style="margin:0;font-size:14px;">' + esc(it.label) + '</h4>';
      html += '</div>';
      html += '<p style="font-size:13px;line-height:1.6;color:var(--text-secondary);margin:0;">' + esc(it.value) + '</p>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  // 
  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p>' +
      '<div class="case-metrics">' + metrics + '</div>';
  }

  // 
  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    var items = cl.map(function (c) {
      return '<div class="changelog-item">' +
        '<span class="cl-version">' + esc(c.version) + '</span>' +
        '<span class="cl-date">' + esc(c.date) + '</span>' +
        '<div class="cl-content">' + esc(c.content) + '</div>' +
        '</div>';
    }).join("");
    return '<div class="changelog">' + items + '</div>';
  }

  // 
  function renderSpecs(specs) {
    if (!specs || !specs.length) return "";
    var rows = specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("");
    return '<div class="sidebar-card"><h4></h4>' + rows + '</div>';
  }

  // 
  function renderPricing(p) {
    if (!p) return "";
    var priceHtml = p.price && p.price !== "—"
      ? '<div class="price-row"><div class="price">' + esc(p.price) + '<small>' + esc(p.unit) + '</small></div></div>'
      : '<div class="price-row"><div class="price" style="font-size:18px;">' + esc(p.model || "—") + '</div></div>';
    return '<div class="sidebar-card">' +
      '<h4></h4>' +
      priceHtml +
      '<div style="font-size:12px;color:var(--text-quaternary);text-align:center;">' + esc(p.model) + '</div>' +
      (p.note ? '<div class="price-note">' + esc(p.note) + '</div>' : '') +
      '</div>';
  }

  // 
  function renderBaseInfo(a) {
    return '<div class="sidebar-card">' +
      '<h4></h4>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.category) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.version) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.updatedAt) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.provider) + '</span></div>' +
      '</div>';
  }

  //  Agent
  function renderRelatedAgents(currentId, a) {
    var data = window.AGENTS_DATA;
    var related = [];
    Object.keys(data).forEach(function (id) {
      if (id !== currentId && data[id].categoryKey === a.categoryKey) {
        related.push({ id: id, agent: data[id] });
      }
    });
    if (!related.length) return "";
    var rows = related.map(function (r) {
      return '<div class="kv-row"><a href="agent-detail.html?id=' + r.id + '" class="k" style="color:var(--accent-600);">' + r.agent.icon + ' ' + esc(r.agent.name) + ' </a></div>';
    }).join("");
    return '<div class="sidebar-card"><h4>Agent</h4>' + rows + '</div>';
  }

  // 
  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.AGENTS_DATA;

    //  Agent
    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span>' +
        '<h1>Agent</h1>' +
        '<p class="lead" style="margin:20px 0 32px;">Agent</p>' +
        '<a href="agents.html" class="btn btn-accent btn-lg">Agent</a>' +
        '</div></section>';
      document.title = "Agent  | Galileo OS";
      return;
    }

    var a = data[id];
    var st = statusMap[a.status] || statusMap.live;

    //  title  meta
    document.title = a.name + " · " + a.category + " | Galileo OS";
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.setAttribute("content", a.name + "" + a.oneLine + "  Galileo OS Agent ");

    //  CTA 
    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + a.name + "";
    var ctaApply = document.getElementById("cta-apply");
    if (ctaApply) ctaApply.setAttribute("onclick", "GalileoAuth.clickUse('" + a.name.replace(/'/g, "\\'") + "')");

    //  HTML
    var html = '';

    // 1. 
    html += '<section class="hero-light" style="padding-bottom:0;">';
    html += '<div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="agents.html">Agent</a><span class="sep">/</span>';
    html += '<span class="current">' + esc(a.category) + '</span><span class="sep">/</span>';
    html += '<span class="current">' + esc(a.name) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 2. Hero 
    html += '<section class="detail-hero" style="padding-top:24px;">';
    html += '<div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + a.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite">' + esc(a.category) + '</span>';
    html += '<span class="badge badge-beta">' + esc(a.version) + '</span>';
    html += '</div>';
    html += '<h1>' + esc(a.name) + '</h1>';
    html += '<p class="desc-line">' + esc(a.oneLine) + '</p>';
    html += '</div>';
    html += '</div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    a.tags.forEach(function (t) {
      html += '<span class="chip">' + esc(t) + '</span>';
    });
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 3. 
    html += '<section style="padding-top:56px;padding-bottom:80px;">';
    html += '<div class="container">';
    html += '<div class="detail-layout">';

    // ——  ——
    html += '<div class="detail-main">';

    // §01 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">01</span></h2>';
    html += '<p>' + esc(a.overview) + '</p>';
    html += '</div>';

    // §02 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">02</span></h2>';
    html += '<div class="callout callout-info"><span class="callout-icon"></span><div>Agent<strong style="color:var(--text-primary);">' + esc(a.role) + '</strong></div></div>';
    html += '</div>';

    // §03 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">03</span></h2>';
    html += renderList(a.capabilities);
    html += '</div>';

    // §04 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">04</span></h2>';
    html += '<p style="margin-bottom:8px;">——</p>';
    html += renderWorkflow(a.workflow);
    html += '</div>';

    // §05 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">05</span></h2>';
    html += '<div class="grid grid-2">';
    html += '<div><h4 style="margin-bottom:12px;font-size:15px;"></h4>' + renderList(a.inputs) + '</div>';
    html += '<div><h4 style="margin-bottom:12px;font-size:15px;"></h4>' + renderList(a.outputs) + '</div>';
    html += '</div>';
    html += '</div>';

    // §06 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">06</span></h2>';
    html += '<p style="margin-bottom:8px;">Agent  Skill Skill  Skill</p>';
    html += renderDependencies(a.dependencies);
    html += '</div>';

    // §07 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">07</span></h2>';
    html += '<div class="callout callout-warn" style="margin-top:0;margin-bottom:20px;"><div>Agent</div></div>';
    html += renderSafety(a.safetyBoundary);
    html += '</div>';

    // §08 
    if (a.case) {
      html += '<div class="detail-section">';
      html += '<h2><span class="sec-num">08</span></h2>';
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(a.case.title) + '</strong></div></div>';
      html += renderCase(a.case);
      html += '</div>';
    }

    // §09 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">09</span></h2>';
    html += renderChangelog(a.changelog);
    html += '</div>';

    html += '</div>'; // /.detail-main

    // ——  ——
    html += '<aside class="detail-sidebar">';

    // CTA  auth-modal
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + a.name.replace(/'/g, "\\'") + '\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;width:100%;cursor:pointer;border:none;"></button>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + a.name.replace(/'/g, "\\'") + '\')" class="btn btn-ghost-light btn-lg full" style="width:100%;cursor:pointer;"></button>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;"></p>';
    html += '</div>';

    // 
    html += renderPricing(a.pricing);

    // 
    html += renderBaseInfo(a);

    // 
    html += renderSpecs(a.specs);

    //  Agent
    html += renderRelatedAgents(id, a);

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += '<div class="kv-row"><a href="agents.html" class="k" style="color:var(--accent-600);">Agent</a></div>';
    html += '<div class="kv-row"><a href="skills.html" class="k" style="color:var(--accent-600);">Skill  </a></div>';
    html += '<div class="kv-row"><a href="partner-opc.html" class="k" style="color:var(--accent-600);">Agent </a></div>';
    html += '</div>';

    html += '</aside>';

    html += '</div>'; // /.detail-layout
    html += '</div>'; // /.container
    html += '</section>';

    root.innerHTML = html;

    // 
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  // 
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="customer-service.js?v=20260705"></script></body></html>
