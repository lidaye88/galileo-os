admin-runtime.js?v=20260705"></script><script>(function () {
  var KEFU = "https://work.weixin.qq.com/kfid/kfc6e28eb8ad6d63cf7";

  //  URL 
  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  // 
  var statusMap = {
    live:  { cls: "badge-live",  text: "" },
    beta:  { cls: "badge-beta",  text: "" },
    soon:  { cls: "badge-soon",  text: "" },
    invite:{ cls: "badge-invite", text: "" }
  };

  // HTML 
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // 
  function highlightCode(code) {
    var esc2 = esc(code);
    // 
    esc2 = esc2.replace(/(\/\/[^\n]*)/g, '<span class="c">$1</span>');
    // 
    esc2 = esc2.replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="s">$1</span>');
    // 
    esc2 = esc2.replace(/\b(const|let|var|await|async|function|return|new|if|else|console|log)\b/g, '<span class="k">$1</span>');
    // 
    esc2 = esc2.replace(/\b(\d+\.?\d*)\b/g, '<span class="n">$1</span>');
    return esc2;
  }

  // 
  function renderParams(params) {
    if (!params || !params.length) return "<p></p>";
    var rows = params.map(function (p) {
      var reqTag = p.req
        ? '<span class="req-tag must"></span>'
        : '<span class="req-tag opt"></span>';
      var defLine = p.def ? ' ·<code style="font-family:\'SF Mono\',monospace;color:var(--accent-600);font-size:13px;">' + esc(p.def) + '</code>' : '';
      var enumLine = p.enum ? '<div style="margin-top:4px;font-size:12px;color:var(--text-quaternary);">' + p.enum.map(esc).join(" / ") + "</div>" : "";
      return '<tr>' +
        '<th>' + esc(p.name) + reqTag + '</th>' +
        '<td class="type">' + esc(p.type) + '</td>' +
        '<td class="required">' + esc(p.desc) + defLine + enumLine + '</td>' +
        '</tr>';
    }).join("");
    return '<table class="spec-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  // feature-list
  function renderList(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) {
      return "<li>" + esc(i) + "</li>";
    }).join("") + "</ul>";
  }

  // 
  function renderCompose(compose) {
    if (!compose) return "";
    var html = "";
    if (compose.upstream && compose.upstream.length) {
      html += '<h4 style="margin:24px 0 8px;font-size:15px;">·</h4>';
      html += '<div class="compose-relate">' + compose.upstream.map(function (u) {
        return '<div class="compose-relate-item"><div class="cr-icon">' + u.icon + '</div><div class="cr-name">' + esc(u.name) + '</div><div class="cr-role">' + esc(u.role) + '</div></div>';
      }).join("") + '</div>';
    }
    if (compose.downstream && compose.downstream.length) {
      html += '<h4 style="margin:24px 0 8px;font-size:15px;">·</h4>';
      html += '<div class="compose-relate">' + compose.downstream.map(function (d) {
        return '<div class="compose-relate-item"><div class="cr-icon">' + d.icon + '</div><div class="cr-name">' + esc(d.name) + '</div><div class="cr-role">' + esc(d.role) + '</div></div>';
      }).join("") + '</div>';
    }
    if (!html) return "<p>Skill</p>";
    return html;
  }

  // 
  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p>' +
      '<div class="case-metrics">' + metrics + '</div>';
  }

  // 
  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    var items = cl.map(function (c) {
      return '<div class="changelog-item">' +
        '<span class="cl-version">' + esc(c.version) + '</span>' +
        '<span class="cl-date">' + esc(c.date) + '</span>' +
        '<div class="cl-content">' + esc(c.content) + '</div>' +
        '</div>';
    }).join("");
    return '<div class="changelog">' + items + '</div>';
  }

  // 
  function renderSpecs(specs) {
    if (!specs || !specs.length) return "";
    var rows = specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("");
    return '<div class="sidebar-card"><h4></h4>' + rows + '</div>';
  }

  // 
  function renderPricing(p) {
    if (!p) return "";
    var priceHtml = p.price && p.price !== "—"
      ? '<div class="price-row"><div class="price">' + esc(p.price) + '<small>' + esc(p.unit) + '</small></div></div>'
      : '<div class="price-row"><div class="price" style="font-size:18px;">' + esc(p.model || "—") + '</div></div>';
    return '<div class="sidebar-card">' +
      '<h4></h4>' +
      priceHtml +
      '<div style="font-size:12px;color:var(--text-quaternary);text-align:center;">' + esc(p.model) + '</div>' +
      (p.note ? '<div class="price-note">' + esc(p.note) + '</div>' : '') +
      '</div>';
  }

  // 
  function renderBaseInfo(s) {
    return '<div class="sidebar-card">' +
      '<h4></h4>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(s.category) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(s.version) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(s.updatedAt) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(s.provider) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v" style="font-size:12px;">' + esc(s.protocol) + '</span></div>' +
      '</div>';
  }

  // 
  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.SKILLS_DATA;

    //  Skill
    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span>' +
        '<h1>Skill</h1>' +
        '<p class="lead" style="margin:20px 0 32px;">Skill</p>' +
        '<a href="skills.html" class="btn btn-accent btn-lg">Skill</a>' +
        '</div></section>';
      document.title = "Skill  | Galileo OS";
      return;
    }

    var s = data[id];
    var st = statusMap[s.status] || statusMap.live;

    //  title
    document.title = s.name + " · " + s.category + " | Galileo OS";

    //  CTA
    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + s.name + "";
    //  hero CTA  clickUse  Skill 
    var ctaApply = document.getElementById("cta-apply");
    if (ctaApply) ctaApply.setAttribute("onclick", "GalileoAuth.clickUse('" + s.name.replace(/'/g, "\\'") + "')");

    //  HTML
    var html = '';

    // 1. 
    html += '<section class="hero-light" style="padding-bottom:0;">';
    html += '<div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="skills.html">Skill</a><span class="sep">/</span>';
    html += '<span class="current">' + esc(s.category) + '</span><span class="sep">/</span>';
    html += '<span class="current">' + esc(s.name) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 2. Hero 
    html += '<section class="detail-hero" style="padding-top:24px;">';
    html += '<div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + s.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite">' + esc(s.category) + '</span>';
    html += '<span class="badge badge-beta">' + esc(s.version) + '</span>';
    html += '</div>';
    html += '<h1>' + esc(s.name) + '</h1>';
    html += '<p class="desc-line">' + esc(s.oneLine) + '</p>';
    html += '</div>';
    html += '</div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    s.tags.forEach(function (t) {
      html += '<span class="chip">' + esc(t) + '</span>';
    });
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 3. 
    html += '<section style="padding-top:56px;padding-bottom:80px;">';
    html += '<div class="container">';
    html += '<div class="detail-layout">';

    // ——  ——
    html += '<div class="detail-main">';

    // §1 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">01</span></h2>';
    html += '<p>' + esc(s.overview) + '</p>';
    html += '</div>';

    // §2 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">02</span></h2>';
    html += '<p>' + esc(s.capability) + '</p>';
    html += '</div>';

    // §3 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">03</span></h2>';
    html += renderParams(s.params);
    html += '</div>';

    // §4  / 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">04</span></h2>';
    html += '<div class="grid grid-2">';
    html += '<div><h4 style="margin-bottom:12px;font-size:15px;"></h4>' + renderList(s.input) + '</div>';
    html += '<div><h4 style="margin-bottom:12px;font-size:15px;"></h4>' + renderList(s.output) + '</div>';
    html += '</div>';
    html += '</div>';

    // §5 
    if (s.code) {
      html += '<div class="detail-section">';
      html += '<h2><span class="sec-num">05</span></h2>';
      html += '<div class="callout callout-info"><div><strong>JavaScript SDK</strong>HTTP APIPython SDK</div></div>';
      html += '<pre class="code-block"><span class="code-label">JavaScript</span><code>' + highlightCode(s.code) + '</code></pre>';
      html += '</div>';
    }

    // §6 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">06</span></h2>';
    html += '<p style="margin-bottom:8px;">Skill</p>';
    html += renderCompose(s.compose);
    html += '</div>';

    // §7 
    if (s.case) {
      html += '<div class="detail-section">';
      html += '<h2><span class="sec-num">07</span></h2>';
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(s.case.title) + '</strong></div></div>';
      html += renderCase(s.case);
      html += '</div>';
    }

    // §8 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">08</span></h2>';
    html += renderChangelog(s.changelog);
    html += '</div>';

    html += '</div>'; // /.detail-main

    // ——  ——
    html += '<aside class="detail-sidebar">';

    // CTA  GalileoAuth.clickUse 
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + s.name.replace(/'/g, "\\'") + '\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;width:100%;cursor:pointer;border:none;font-family:inherit;"></button>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + s.name.replace(/'/g, "\\'") + '\')" class="btn btn-ghost-light btn-lg full" style="width:100%;cursor:pointer;"></button>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;"></p>';
    html += '</div>';

    // 
    html += renderPricing(s.pricing);

    // 
    html += renderBaseInfo(s);

    // 
    html += renderSpecs(s.specs);

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += '<div class="kv-row"><a href="skills.html" class="k" style="color:var(--accent-600);">Skill</a></div>';
    html += '<div class="kv-row"><a href="agents.html" class="k" style="color:var(--accent-600);">Agent  </a></div>';
    html += '<div class="kv-row"><a href="developers.html" class="k" style="color:var(--accent-600);">Skill </a></div>';
    html += '</div>';

    html += '</aside>';

    html += '</div>'; // /.detail-layout
    html += '</div>'; // /.container
    html += '</section>';

    root.innerHTML = html;

    // 
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  // 
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="auth-modal.js?v=20260705"></script><script src="mobile-nav.js?v=20260705"></script><script src="animate.js?v=20260705"></script><script src="customer-service.js?v=20260705"></script></body></html>
