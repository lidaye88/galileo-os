0705"></script><script>(function () {
  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  var statusMap = {
    live:  { cls: "badge-live",  text: "" },
    beta:  { cls: "badge-beta",  text: "" },
    soon:  { cls: "badge-soon",  text: "" }
  };

  function esc(s) {
    return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function renderContent(content) {
    if (!content || !content.length) return "";
    return '<div class="grid grid-2" style="gap:16px;">' + content.map(function (c) {
      return '<div class="card" style="padding:24px;">' +
        '<div class="flex items-center gap-8 mb-16" style="flex-wrap:wrap;">' +
        '<h4 style="margin:0;font-size:16px;">' + esc(c.type) + '</h4>' +
        '<span class="badge badge-invite">' + esc(c.count) + '</span>' +
        '</div>' +
        '<p style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0;">' + esc(c.desc) + '</p>' +
        '</div>';
    }).join("") + '</div>';
  }

  function renderList(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) { return "<li>" + esc(i) + "</li>"; }).join("") + "</ul>";
  }

  // /Agent/Skill
  function renderRelated(arr, icon, label, type) {
    if (!arr || !arr.length) return "";
    return '<div class="compose-relate">' + arr.map(function (r) {
      var href = r.id ? (type + '-detail.html?id=' + esc(r.id)) : (type + 's.html');
      return '<a href="' + href + '" class="compose-relate-item" style="text-decoration:none;color:inherit;"><div class="cr-icon">' + icon + '</div><div class="cr-name">' + esc(r.name) + '</div><div class="cr-role">' + esc(label) + '</div></a>';
    }).join("") + '</div>';
  }

  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p><div class="case-metrics">' + metrics + '</div>';
  }

  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    return '<div class="changelog">' + cl.map(function (c) {
      return '<div class="changelog-item"><span class="cl-version">' + esc(c.version) + '</span><span class="cl-date">' + esc(c.date) + '</span><div class="cl-content">' + esc(c.content) + '</div></div>';
    }).join("") + '</div>';
  }

  function renderSpecs(specs) {
    if (!specs || !specs.length) return "";
    return '<div class="sidebar-card"><h4></h4>' + specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("") + '</div>';
  }

  function renderQuality(q) {
    if (!q) return "";
    return '<div class="sidebar-card"><h4></h4>' +
      '<div class="kv-row"><span class="k"></span><span class="v" style="color:var(--accent-600);">' + esc(q.accuracy) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(q.lastVerified) + '</span></div>' +
      '</div>' +
      '<div class="sidebar-card" style="background:var(--accent-50);border-color:var(--accent-500);">' +
      '<p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0;">' + esc(q.verifiedBy) + '</p></div>';
  }

  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.KNOWLEDGE_DATA;

    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span><h1></h1>' +
        '<p class="lead" style="margin:20px 0 32px;"></p>' +
        '<a href="knowledge.html" class="btn btn-accent btn-lg"></a></div></section>';
      document.title = " | Galileo OS";
      return;
    }

    var k = data[id];
    var st = statusMap[k.status] || statusMap.live;
    document.title = k.name + " · " + k.category + " | Galileo OS";

    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + k.name + "";
    var ctaApply = document.getElementById("cta-apply");
    if (ctaApply) ctaApply.setAttribute("onclick", "GalileoAuth.clickUse('" + k.name.replace(/'/g, "\\'") + "')");

    var safeName = k.name.replace(/'/g, "\\'");
    var html = '';

    // 
    html += '<section class="hero-light" style="padding-bottom:0;"><div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="knowledge.html"></a><span class="sep">/</span>';
    html += '<span class="current">' + esc(k.category) + '</span><span class="sep">/</span>';
    html += '<span class="current">' + esc(k.name) + '</span>';
    html += '</div></div></section>';

    // Hero
    html += '<section class="detail-hero" style="padding-top:24px;"><div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + k.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite">' + esc(k.category) + '</span>';
    html += '<span class="badge badge-beta">' + esc(k.version) + '</span>';
    // OPC 
    if (k.providerType === "OPC") {
      html += '<span class="badge badge-live">OPC</span>';
    }
    html += '</div>';
    html += '<h1>' + esc(k.name) + '</h1>';
    html += '<p class="desc-line">' + esc(k.oneLine) + '</p>';
    html += '<p style="font-size:13px;color:var(--text-tertiary);margin-top:12px;">' + esc(k.provider) + '</p>';
    html += '</div></div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    k.tags.forEach(function (t) { html += '<span class="chip">' + esc(t) + '</span>'; });
    html += '</div>';
    html += '</div></section>';

    // 
    html += '<section style="padding-top:56px;padding-bottom:80px;"><div class="container"><div class="detail-layout">';
    html += '<div class="detail-main">';

    html += '<div class="detail-section"><h2><span class="sec-num">01</span></h2><p>' + esc(k.overview) + '</p></div>';

    html += '<div class="detail-section"><h2><span class="sec-num">02</span></h2>';
    html += renderContent(k.content);
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">03</span></h2>';
    html += renderList(k.scenes);
    html += '</div>';

    // 
    html += '<div class="detail-section"><h2><span class="sec-num">04</span></h2>';
    html += '<p style="margin-bottom:8px;">AgentSkill</p>';
    var hasRelated = false;
    if (k.useApps && k.useApps.length) { html += '<h4 style="margin:16px 0 8px;font-size:15px;"></h4>' + renderRelated(k.useApps, "", "", "app"); hasRelated = true; }
    if (k.useAgents && k.useAgents.length) { html += '<h4 style="margin:16px 0 8px;font-size:15px;">Agent</h4>' + renderRelated(k.useAgents, "", "", "agent"); hasRelated = true; }
    if (k.useSkills && k.useSkills.length) { html += '<h4 style="margin:16px 0 8px;font-size:15px;">Skill</h4>' + renderRelated(k.useSkills, "", "", "skill"); hasRelated = true; }
    if (!hasRelated) { html += '<p></p>'; }
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">05</span></h2>';
    if (k.case) {
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(k.case.title) + '</strong></div></div>';
      html += renderCase(k.case);
    }
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">06</span></h2>';
    html += renderChangelog(k.changelog);
    html += '</div>';

    html += '</div>'; // /detail-main

    // 
    html += '<aside class="detail-sidebar">';
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + safeName + '\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;width:100%;cursor:pointer;border:none;font-family:inherit;"></button>';
    html += '<button onclick="GalileoAuth.showContact(\'' + safeName + '\')" class="btn btn-ghost-light btn-lg full" style="width:100%;cursor:pointer;"></button>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;"></p>';
    html += '</div>';

    // 
    if (k.pricing) {
      var priceHtml = (k.pricing.price && k.pricing.price !== "—")
        ? '<div class="price-row"><div class="price">' + esc(k.pricing.price) + '<small>' + esc(k.pricing.unit) + '</small></div></div>'
        : '<div class="price-row"><div class="price" style="font-size:18px;">' + esc(k.pricing.model) + '</div></div>';
      html += '<div class="sidebar-card"><h4></h4>' + priceHtml +
        '<div style="font-size:12px;color:var(--text-quaternary);text-align:center;">' + esc(k.pricing.model) + '</div>' +
        (k.pricing.note ? '<div class="price-note">' + esc(k.pricing.note) + '</div>' : '') + '</div>';
    }

    // 
    html += '<div class="sidebar-card"><h4></h4>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + esc(k.category) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + esc(k.version) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + esc(k.updatedAt) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v">' + esc(k.providerType) + '</span></div>';
    html += '<div class="kv-row"><span class="k"></span><span class="v" style="font-size:12px;">' + (k.industry||[]).join("") + '</span></div>';
    html += '</div>';

    html += renderQuality(k.quality);
    html += renderSpecs(k.specs);

    html += '<div class="sidebar-card"><h4></h4>';
    html += '<div class="kv-row"><a href="knowledge.html" class="k" style="color:var(--accent-600);"></a></div>';
    if (k.providerType === "OPC") {
      html += '<div class="kv-row"><a href="partner-opc.html" class="k" style="color:var(--accent-600);"> </a></div>';
    }
    html += '<div class="kv-row"><a href="app-detail.html?id=industrial-knowledge" class="k" style="color:var(--accent-600);"> </a></div>';
    html += '</div>';

    html += '</aside>'; // /sidebar
    html += '</div></div></section>';

    root.innerHTML = html;
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="customer-service.js?v=20260705"></script></body></html>
