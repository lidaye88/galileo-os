animate.js?v=20260705"></script><!-- ====================  +  ==================== --><script src="engines-data.js?v=20260705"></script><script src="admin-runtime.js?v=20260705"></script><script>(function () {
  var KEFU = "https://work.weixin.qq.com/kfid/kfc6e28eb8ad6d63cf7";

  //  URL 
  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  // 
  var statusMap = {
    live:  { cls: "badge-live",  text: "" },
    beta:  { cls: "badge-beta",  text: "" },
    soon:  { cls: "badge-soon",  text: "" },
    invite:{ cls: "badge-invite", text: "" }
  };

  // HTML 
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // capabilities
  function renderCapabilities(caps) {
    if (!caps || !caps.length) return "";
    var cards = caps.map(function (c) {
      return '<div class="compose-relate-item" style="align-items:flex-start;gap:14px;">' +
        '<div style="flex:1;min-width:0;">' +
        '<div class="cr-name" style="margin-bottom:6px;">' + esc(c.name) + '</div>' +
        '<div class="cr-role" style="line-height:1.6;">' + esc(c.desc) + '</div>' +
        '</div>' +
        '</div>';
    }).join("");
    return '<div class="compose-relate" style="grid-template-columns:repeat(2,1fr);">' + cards + '</div>';
  }

  // feature-list
  function renderScenarios(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) {
      return "<li>" + esc(i) + "</li>";
    }).join("") + "</ul>";
  }

  // kv-row 
  function renderTechSpecs(specs) {
    if (!specs || !specs.length) return "";
    var rows = specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("");
    return '<div class="sidebar-card" style="padding:0;"><div style="padding:20px 24px 0;">' + rows + '</div></div>';
  }

  //  Skillcompose-relate  skill-detail
  function renderRelatedSkills(skills) {
    if (!skills || !skills.length) return '<p style="color:var(--text-tertiary);">Skill</p>';
    var cards = skills.map(function (s) {
      return '<a href="skill-detail.html?id=' + encodeURIComponent(s.id) + '" class="compose-relate-item" style="text-decoration:none;display:block;">' +
        '<div class="cr-name" style="color:var(--accent-600);">' + esc(s.name) + '</div>' +
        '<div class="cr-role">Skill  </div>' +
        '</a>';
    }).join("");
    return '<div class="compose-relate" style="grid-template-columns:repeat(2,1fr);">' + cards + '</div>';
  }

  // flow-chain
  function renderIntegrationFlow() {
    return '<div class="flow-chain">' +
      '<div class="flow-node">IoT</div>' +
      '<span class="flow-arrow"></span>' +
      '<div class="flow-node"></div>' +
      '<span class="flow-arrow"></span>' +
      '<div class="flow-node current"></div>' +
      '<span class="flow-arrow"></span>' +
      '<div class="flow-node">Agent /</div>' +
      '</div>';
  }

  // 
  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p>' +
      '<div class="case-metrics">' + metrics + '</div>';
  }

  // 
  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    var items = cl.map(function (c) {
      return '<div class="changelog-item">' +
        '<span class="cl-version">' + esc(c.version) + '</span>' +
        '<span class="cl-date">' + esc(c.date) + '</span>' +
        '<div class="cl-content">' + esc(c.content) + '</div>' +
        '</div>';
    }).join("");
    return '<div class="changelog">' + items + '</div>';
  }

  // 
  function renderBaseInfo(e) {
    var st = statusMap[e.status] || statusMap.live;
    return '<div class="sidebar-card">' +
      '<h4></h4>' +
      '<div class="kv-row"><span class="k"></span><span class="v">ENGINE ' + esc(e.engineNum) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v"><span class="badge ' + st.cls + '">' + st.text + '</span></span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(e.version) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(e.updatedAt) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(e.provider) + '</span></div>' +
      '</div>';
  }

  // 
  function renderSidebarSpecs(specs) {
    if (!specs || !specs.length) return "";
    var rows = specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("");
    return '<div class="sidebar-card"><h4></h4>' + rows + '</div>';
  }

  // 
  function renderRelatedEngines(currentId) {
    var data = window.ENGINES_DATA;
    var html = "";
    Object.keys(data).forEach(function (eid) {
      if (eid === currentId) return;
      var e = data[eid];
      html += '<a href="engine-detail.html?id=' + encodeURIComponent(eid) + '" class="compose-relate-item" style="text-decoration:none;display:block;">' +
        '<div class="cr-icon">' + e.icon + '</div>' +
        '<div style="flex:1;min-width:0;">' +
        '<div class="cr-name" style="color:var(--accent-600);font-size:13px;">ENGINE ' + e.engineNum + ' · ' + esc(e.name) + '</div>' +
        '</div>' +
        '</a>';
    });
    return '<div class="compose-relate" style="grid-template-columns:1fr;">' + html + '</div>';
  }

  // 
  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.ENGINES_DATA;

    // 
    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span>' +
        '<h1></h1>' +
        '<p class="lead" style="margin:20px 0 32px;"></p>' +
        '<a href="platform.html" class="btn btn-accent btn-lg"></a>' +
        '</div></section>';
      document.title = " | Galileo OS";
      return;
    }

    var e = data[id];
    var st = statusMap[e.status] || statusMap.live;

    //  title
    document.title = e.name + " ·  | Galileo OS";

    //  CTA Band 
    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + e.name + "";

    //  CTA 
    var ctaConsult = document.getElementById("cta-consult");
    if (ctaConsult) {
      ctaConsult.setAttribute("onclick", "GalileoAuth.clickUse('" + e.name.replace(/'/g, "\\'") + "')");
    }

    //  HTML
    var html = '';

    // 1. 
    html += '<section class="hero-light" style="padding-bottom:0;">';
    html += '<div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="platform.html"></a><span class="sep">/</span>';
    html += '<span class="current">' + esc(e.name) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 2. Hero 
    html += '<section class="detail-hero" style="padding-top:24px;">';
    html += '<div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + e.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite">ENGINE ' + esc(e.engineNum) + '</span>';
    html += '<span class="badge badge-beta">' + esc(e.version) + '</span>';
    html += '</div>';
    html += '<h1>' + esc(e.name) + '</h1>';
    html += '<p class="desc-line">' + esc(e.oneLine) + '</p>';
    html += '</div>';
    html += '</div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    e.tags.forEach(function (t) {
      html += '<span class="chip">' + esc(t) + '</span>';
    });
    html += '</div>';
    html += '</div>';
    html += '</section>';

    // 3. 
    html += '<section style="padding-top:56px;padding-bottom:80px;">';
    html += '<div class="container">';
    html += '<div class="detail-layout">';

    // ——  ——
    html += '<div class="detail-main">';

    // §01 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">01</span></h2>';
    html += '<p>' + esc(e.overview) + '</p>';
    html += '</div>';

    // §02 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">02</span></h2>';
    html += '<p>' + esc(e.principle) + '</p>';
    html += '<div class="callout callout-info"><span class="callout-icon"></span><div></div></div>';
    html += '</div>';

    // §03 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">03</span></h2>';
    html += '<p style="margin-bottom:8px;"></p>';
    html += renderCapabilities(e.capabilities);
    html += '</div>';

    // §04 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">04</span></h2>';
    html += '<p style="margin-bottom:8px;"></p>';
    html += renderTechSpecs(e.techSpecs);
    html += '</div>';

    // §05 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">05</span></h2>';
    html += renderScenarios(e.scenarios);
    html += '</div>';

    // §06 /
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">06</span>/ </h2>';
    html += '<p>' + esc(e.integration) + '</p>';
    html += renderIntegrationFlow();
    html += '</div>';

    // §07  Skill
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">07</span>Skill</h2>';
    html += '<p style="margin-bottom:8px;">Skill  Agent  Skill</p>';
    html += renderRelatedSkills(e.relatedSkills);
    html += '</div>';

    // §08 
    if (e.case) {
      html += '<div class="detail-section">';
      html += '<h2><span class="sec-num">08</span></h2>';
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(e.case.title) + '</strong></div></div>';
      html += renderCase(e.case);
      html += '</div>';
    }

    // §09 
    html += '<div class="detail-section">';
    html += '<h2><span class="sec-num">09</span></h2>';
    html += renderChangelog(e.changelog);
    html += '</div>';

    html += '</div>'; // /.detail-main

    // ——  ——
    html += '<aside class="detail-sidebar">';

    // CTA 
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + e.name.replace(/'/g, "\\'") + '接入\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;"></button>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + e.name.replace(/'/g, "\\'") + '试用\')" class="btn btn-ghost-light btn-lg full"></button>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;"></p>';
    html += '</div>';

    // 
    html += renderBaseInfo(e);

    // 
    html += renderSidebarSpecs(e.techSpecs);

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += renderRelatedEngines(id);
    html += '</div>';

    // 
    html += '<div class="sidebar-card">';
    html += '<h4></h4>';
    html += '<div class="kv-row"><a href="platform.html" class="k" style="color:var(--accent-600);"></a></div>';
    html += '<div class="kv-row"><a href="skills.html" class="k" style="color:var(--accent-600);">Skill  </a></div>';
    html += '<div class="kv-row"><a href="agents.html" class="k" style="color:var(--accent-600);">Agent  </a></div>';
    html += '</div>';

    html += '</aside>';

    html += '</div>'; // /.detail-layout
    html += '</div>'; // /.container
    html += '</section>';

    root.innerHTML = html;

    // 
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  // 
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="customer-service.js?v=20260705"></script></body></html>
