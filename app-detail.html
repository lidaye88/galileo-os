) {
  var KEFU = "https://work.weixin.qq.com/kfid/kfc6e28eb8ad6d63cf7";

  function getQueryParam(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  var statusMap = {
    live:  { cls: "badge-live",  text: "" },
    beta:  { cls: "badge-beta",  text: "" },
    soon:  { cls: "badge-soon",  text: "" },
    invite:{ cls: "badge-invite", text: "" }
  };

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function renderModules(modules) {
    if (!modules || !modules.length) return "";
    return '<div class="grid grid-2" style="gap:16px;">' + modules.map(function (m) {
      return '<div class="card" style="padding:24px;">' +
        '<h4 style="margin-bottom:8px;font-size:16px;">' + esc(m.name) + '</h4>' +
        '<p style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0;">' + esc(m.desc) + '</p>' +
        '</div>';
    }).join("") + '</div>';
  }

  function renderList(items) {
    if (!items || !items.length) return "";
    return '<ul class="feature-list">' + items.map(function (i) { return "<li>" + esc(i) + "</li>"; }).join("") + "</ul>";
  }

  // agents + skills
  function renderComponents(comp) {
    if (!comp) return "<p></p>";
    var html = "";
    if (comp.agents && comp.agents.length) {
      html += '<h4 style="margin:0 0 12px;font-size:15px;">Agent</h4>';
      html += '<div class="compose-relate">' + comp.agents.map(function (a) {
        var href = a.id ? 'agent-detail.html?id=' + esc(a.id) : 'agents.html';
        return '<a href="' + href + '" class="compose-relate-item" style="text-decoration:none;color:inherit;"><div class="cr-icon"></div><div class="cr-name">' + esc(a.name) + '</div><div class="cr-role"></div></a>';
      }).join("") + '</div>';
    }
    if (comp.skills && comp.skills.length) {
      html += '<h4 style="margin:24px 0 12px;font-size:15px;">Skill</h4>';
      html += '<div class="compose-relate">' + comp.skills.map(function (s) {
        var href = s.id ? 'skill-detail.html?id=' + esc(s.id) : 'skills.html';
        return '<a href="' + href + '" class="compose-relate-item" style="text-decoration:none;color:inherit;"><div class="cr-icon"></div><div class="cr-name">' + esc(s.name) + '</div><div class="cr-role"></div></a>';
      }).join("") + '</div>';
    }
    if (comp.knowledge && comp.knowledge.length) {
      html += '<h4 style="margin:24px 0 12px;font-size:15px;"></h4>';
      html += '<div class="compose-relate">' + comp.knowledge.map(function (k) {
        var href = k.id ? 'knowledge-detail.html?id=' + esc(k.id) : 'knowledge.html';
        return '<a href="' + href + '" class="compose-relate-item" style="text-decoration:none;color:inherit;"><div class="cr-icon"></div><div class="cr-name">' + esc(k.name) + '</div><div class="cr-role"></div></a>';
      }).join("") + '</div>';
    }
    return html;
  }

  function renderCase(c) {
    if (!c) return "";
    var metrics = (c.metrics || []).map(function (m) {
      return '<div class="case-metric"><div class="cm-num">' + esc(m.num) + '</div><div class="cm-label">' + esc(m.label) + '</div></div>';
    }).join("");
    return '<p>' + esc(c.desc) + '</p><div class="case-metrics">' + metrics + '</div>';
  }

  function renderChangelog(cl) {
    if (!cl || !cl.length) return "";
    return '<div class="changelog">' + cl.map(function (c) {
      return '<div class="changelog-item"><span class="cl-version">' + esc(c.version) + '</span><span class="cl-date">' + esc(c.date) + '</span><div class="cl-content">' + esc(c.content) + '</div></div>';
    }).join("") + '</div>';
  }

  function renderSpecs(specs) {
    if (!specs || !specs.length) return "";
    return '<div class="sidebar-card"><h4></h4>' + specs.map(function (s) {
      return '<div class="kv-row"><span class="k">' + esc(s.k) + '</span><span class="v">' + esc(s.v) + '</span></div>';
    }).join("") + '</div>';
  }

  function renderPricing(p) {
    if (!p) return "";
    var priceHtml = (p.price && p.price !== "—")
      ? '<div class="price-row"><div class="price">' + esc(p.price) + '<small>' + esc(p.unit) + '</small></div></div>'
      : '<div class="price-row"><div class="price" style="font-size:18px;">' + esc(p.model || "—") + '</div></div>';
    return '<div class="sidebar-card"><h4></h4>' + priceHtml +
      '<div style="font-size:12px;color:var(--text-quaternary);text-align:center;">' + esc(p.model) + '</div>' +
      (p.note ? '<div class="price-note">' + esc(p.note) + '</div>' : '') + '</div>';
  }

  function renderBaseInfo(a) {
    return '<div class="sidebar-card"><h4></h4>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.category) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.version) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.updatedAt) + '</span></div>' +
      '<div class="kv-row"><span class="k"></span><span class="v">' + esc(a.provider) + '</span></div>' +
      '</div>';
  }

  function render() {
    var id = getQueryParam("id");
    var root = document.getElementById("detail-root");
    var data = window.APPS_DATA;

    if (!id || !data[id]) {
      root.innerHTML = '<section class="hero-light"><div class="container narrow center">' +
        '<span class="eyebrow center"></span><h1></h1>' +
        '<p class="lead" style="margin:20px 0 32px;"></p>' +
        '<a href="apps.html" class="btn btn-accent btn-lg"></a></div></section>';
      document.title = " | Galileo OS";
      return;
    }

    var a = data[id];
    var st = statusMap[a.status] || statusMap.live;
    document.title = a.name + " · " + a.category + " | Galileo OS";

    var ctaTitle = document.getElementById("cta-title");
    if (ctaTitle) ctaTitle.textContent = "" + a.name + "";
    var ctaApply = document.getElementById("cta-apply");
    if (ctaApply) ctaApply.setAttribute("onclick", "GalileoAuth.clickUse('" + a.name.replace(/'/g, "\\'") + "')");

    var safeName = a.name.replace(/'/g, "\\'");
    var html = '';

    // 
    html += '<section class="hero-light" style="padding-bottom:0;"><div class="container">';
    html += '<div class="breadcrumb">';
    html += '<a href="index.html"></a><span class="sep">/</span>';
    html += '<a href="apps.html"></a><span class="sep">/</span>';
    html += '<span class="current">' + esc(a.category) + '</span><span class="sep">/</span>';
    html += '<span class="current">' + esc(a.name) + '</span>';
    html += '</div></div></section>';

    // Hero
    html += '<section class="detail-hero" style="padding-top:24px;"><div class="container">';
    html += '<div class="detail-hero-top">';
    html += '<div class="detail-hero-icon">' + a.icon + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div class="badges-row">';
    html += '<span class="badge ' + st.cls + '">' + st.text + '</span>';
    html += '<span class="badge badge-invite">' + esc(a.category) + '</span>';
    html += '<span class="badge badge-beta">' + esc(a.version) + '</span>';
    html += '</div>';
    html += '<h1>' + esc(a.name) + '</h1>';
    html += '<p class="desc-line">' + esc(a.oneLine) + '</p>';
    html += '</div></div>';
    html += '<div class="detail-hero-tags pill-cloud">';
    a.tags.forEach(function (t) { html += '<span class="chip">' + esc(t) + '</span>'; });
    html += '</div>';
    html += '</div></section>';

    // 
    html += '<section style="padding-top:56px;padding-bottom:80px;"><div class="container"><div class="detail-layout">';
    html += '<div class="detail-main">';

    html += '<div class="detail-section"><h2><span class="sec-num">01</span></h2><p>' + esc(a.overview) + '</p></div>';

    html += '<div class="detail-section"><h2><span class="sec-num">02</span></h2>';
    html += renderModules(a.modules);
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">03</span></h2>';
    html += '<p style="margin-bottom:8px;">Agent  Skill</p>';
    html += renderComponents(a.components);
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">04</span></h2>';
    html += renderList(a.scenarios);
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">05</span></h2>';
    html += '<div class="callout callout-info"><span class="callout-icon"></span><div>' + esc(a.deployment) + '</div></div>';
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">06</span></h2>';
    if (a.case) {
      html += '<div class="callout callout-info" style="margin-bottom:20px;"><div><strong>' + esc(a.case.title) + '</strong></div></div>';
      html += renderCase(a.case);
    }
    html += '</div>';

    html += '<div class="detail-section"><h2><span class="sec-num">07</span></h2>';
    html += renderChangelog(a.changelog);
    html += '</div>';

    html += '</div>'; // /detail-main

    // 
    html += '<aside class="detail-sidebar">';
    html += '<div class="sidebar-card" style="background:var(--ink-900);border-color:var(--ink-900);">';
    html += '<h4 style="color:var(--accent-400);"></h4>';
    html += '<button onclick="GalileoAuth.clickUse(\'' + safeName + '\')" class="btn btn-accent btn-lg full" style="margin-bottom:8px;width:100%;cursor:pointer;border:none;font-family:inherit;"></button>';
    html += '<button onclick="GalileoAuth.showContact(\'' + safeName + '\')" class="btn btn-ghost-light btn-lg full" style="width:100%;cursor:pointer;"></button>';
    html += '<p style="font-size:12px;color:var(--text-inverse-3);text-align:center;margin-top:12px;"></p>';
    html += '</div>';

    html += renderPricing(a.pricing);
    html += renderBaseInfo(a);
    html += renderSpecs(a.specs);

    html += '<div class="sidebar-card"><h4></h4>';
    html += '<div class="kv-row"><a href="apps.html" class="k" style="color:var(--accent-600);"></a></div>';
    html += '<div class="kv-row"><a href="agents.html" class="k" style="color:var(--accent-600);">Agent  </a></div>';
    html += '<div class="kv-row"><a href="solutions.html" class="k" style="color:var(--accent-600);"> </a></div>';
    html += '</div>';

    html += '</aside>'; // /sidebar
    html += '</div></div></section>'; // /layout /container /section

    root.innerHTML = html;
    window.scrollTo(0, 0);
    // 
    if (window.GalileoAnimate) setTimeout(window.GalileoAnimate.refresh, 50);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();</script><script src="customer-service.js?v=20260705"></script></body></html>
